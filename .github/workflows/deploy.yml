name: Deploy Mind to VPS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # -----------------
      # FRONTEND
      # -----------------

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build frontend
        run: |
          npm ci
          npm run build

      # -----------------
      # BACKEND
      # -----------------

      - name: Set up Go 1.26
        uses: actions/setup-go@v4
        with:
          go-version: 1.26

      - name: Build Go binary
        run: |
          CGO_ENABLED=0 go build -o mind-journey-map ./cmd/server

      # -----------------
      # DEPLOY TO VPS
      # -----------------

      - name: Copy binary to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "mind-journey-map"
          target: "/opt/mind-journey-map/"

      - name: Deploy systemd service
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/mind-journey-map
            sudo systemctl restart mind-journey-map
            sudo systemctl status mind-journey-map --no-pager
